<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f3f4f6;color:#333}
/* Znajdź i podmień ten fragment */

.layout{display:flex;height:calc(100vh - 56px)}
.sidebar{width:260px;background:#fff;border-right:1px solid #ddd;padding:15px}
.compose-btn {
  width: 100%;
  background: #123e61; /* Nowy kolor granatowy */
  color: #fff;
  border: 0;
  border-radius: 4px;
  padding: 10px;
  font-weight: bold;
  cursor: pointer;
  margin-bottom: 15px;
}
.header { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: #f1eadf; border-bottom: 1px solid #d8dde3; gap: 20px; }
    .logo { display: flex; align-items: center; margin-right: auto; }
    .logo img { height: 65px; margin-right: 10px; }
    .logo span { font-size: 22px; color: #123e61; font-weight: bold; }
    .menu-header { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; flex-grow: 1; }
    .menu-header .menu-item a { display: block; padding: 10px 18px; background: #ffffff; border: 1px solid #cfd5db; border-radius: 4px; text-decoration: none; color: #333; font-size: 13px; white-space: nowrap; }
    .menu-header .menu-item a:hover { background: #e9edf2; }
.main{flex:1;background:#fff;display:flex;flex-direction:column}
.list{flex:1;overflow:auto}
.row{display:grid;grid-template-columns:220px 1fr 90px;gap:10px;padding:12px 15px;border-bottom:1px solid #eee;cursor:pointer}
.row.unread .sender,.row.unread .subject{font-weight:bold}
.row:hover{background:#f9fafb}
.sender{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.subject{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.date{text-align:right;font-size:13px;color:#666}
.view{padding:20px;display:none}
.view h2{margin-top:0}
.compose{padding:20px;display:none;max-width:900px}
.field{margin-bottom:15px}
.field label{font-weight:bold;display:block;margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;padding:8px;border:1px solid #ccc;border-radius:4px}
.field textarea{height:160px}
.send-btn {
  background: #123e61; /* Nowy kolor granatowy */
  color: #fff;
  border: 0;
  padding: 10px 20px;
  border-radius: 4px;
  font-weight: bold;
  cursor: pointer;
}
.back{margin-bottom:15px;cursor:pointer;color:#2f80ed}
/* modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center}
.modal-box{background:#fff;width:420px;max-height:80vh;overflow:auto;border-radius:6px;padding:20px}
.tree .group{margin:6px 0}
.tree .group-header{display:flex;align-items:center;gap:6px;cursor:pointer}
.tree ul{list-style:none;padding-left:26px;display:none}

.top-left{
  display:flex;
  align-items:center;
  gap:15px;
}

.top-btn{
  color:#333;
  text-decoration:none;
  background:#ffffff;
  padding:6px 12px;
  border-radius:4px;
  font-size:14px;
}

.top-btn:hover{
  background:#7c8fa6;
}

.top-right{
  font-size:14px;
  opacity:0.95;
}
.user-info {
  font-size: 12px;
  color: #555;
  text-align: right;
  flex-shrink: 0;
  min-width: 150px;
}
.menu { 
  list-style: none; 
  padding: 0; 
  margin: 0; 
  display: flex; 
  flex-direction: column; 
  gap: 10px; /* Odstęp między przyciskami */
}

/* Zamiana elementów listy w granatowe przyciski */
.menu li { 
  background: #123e61; /* Twój granatowy kolor */
  color: white; 
  padding: 12px 15px; 
  border-radius: 6px; 
  cursor: pointer; 
  text-align: center; 
  font-weight: bold; 
  transition: background 0.3s;
  border: 1px solid #0d2d46;
}

/* Efekt po najechaniu myszką */
.menu li:hover { 
  background: #1a5685; 
}

/* Styl dla aktywnego przycisku (wybranego) */
.menu li.active { 
  background: #f1eadf; /* Kolor piaskowy dla wyróżnienia, co jest wybrane */
  color: #123e61; 
  border: 2px solid #123e61;
}
</style>

<script>
let inbox=JSON.parse(localStorage.getItem('inbox')||'[]');
let sent=JSON.parse(localStorage.getItem('sent')||'[]');
let selected=[];
const list=document.getElementById('list');
const view=document.getElementById('view');
mode.onchange=()=>senderField.style.display=mode.value==='toMe'?'block':'none';
function renderInbox(){list.innerHTML='';inbox.forEach((m,i)=>{list.innerHTML+=`<div class="row ${m.read?'':'unread'}" onclick="openMsg(${i})"><div class="sender">${m.from}</div><div class="subject">${m.subject}</div><div class="date">${m.date}</div></div>`})}
function renderSent(){list.innerHTML='';sent.forEach(m=>{list.innerHTML+=`<div class="row"><div class="sender">${m.to}</div><div class="subject">${m.subject}</div><div class="date">${m.date}</div></div>`})}
function openMsg(i){const m=inbox[i];m.read=true;localStorage.setItem('inbox',JSON.stringify(inbox));list.style.display='none';view.style.display='block';view.innerHTML=`<div class="back" onclick="backToList()">← Powrót</div><h2>${m.subject}</h2><p><b>Od:</b> ${m.from}</p><p>${m.body||'(brak treści)'}</p>`}
function backToList(){view.style.display='none';list.style.display='block';renderInbox()}
function showInbox(el){setActive(el);compose.style.display='none';view.style.display='none';list.style.display='block';renderInbox()}
function showSent(el){setActive(el);compose.style.display='none';view.style.display='none';list.style.display='block';renderSent()}
function setActive(el){document.querySelectorAll('.menu li').forEach(li=>li.classList.remove('active'));el.classList.add('active')}
function openCompose(){compose.style.display='block';list.style.display='none';view.style.display='none'}
function openModal(){modal.style.display='flex'}
function closeModal(){modal.style.display='none';selected=[...modal.querySelectorAll('input[value]:checked')].map(i=>i.value);chosen.innerText=selected.join(', ')}
function toggleGroup(h){const ul=h.nextElementSibling;ul.style.display=ul.style.display==='block'?'none':'block'}
function toggleAll(cb){const ul=cb.parentElement.nextElementSibling;ul.querySelectorAll('input').forEach(i=>i.checked=cb.checked)}
function sendMsg(){const d=new Date().toLocaleDateString('pl-PL');if(mode.value==='toMe'){inbox.unshift({from: senderPerson.value
,subject:subject.value,body:body.value,date:d,read:false})}else{sent.unshift({to:selected.join(', ')||'Rodzice',subject:subject.value,date:d})}
localStorage.setItem('inbox',JSON.stringify(inbox));localStorage.setItem('sent',JSON.stringify(sent));alert('Wiadomość wysłana (symulacja)');subject.value=body.value='';showInbox(document.querySelector('.menu li'))}
renderInbox();
function loadSenders() {
  const role = senderRole.value;
  senderPerson.innerHTML = "";

  if (!role) {
    senderPerson.innerHTML = "<option>— najpierw wybierz rolę —</option>";
    senderPerson.disabled = true;
    return;
  }

  peopleByRole[role].forEach(p => {
    const opt = document.createElement("option");
    opt.textContent = p;
    opt.value = p;
    senderPerson.appendChild(opt);
  });

  senderPerson.disabled = false;
}

    "Milena Wół",
    "Patrycja Nowak"
  ],

  ],
